<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--! Favicon -->
  <link rel="icon" href="{{ url_for('static', filename='img/property_sales_logo.png') }}" type="image/x-icon" />

  <!--! FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet" />

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <!--! Bootstrap Style -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />

  <!--! Custom Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />

  <title>{% block title %}Property Sales{% endblock %}</title>
</head>

<body class="{% block body_class %}{% endblock %}">

  <!-- HEADER -->
  <header class="header">
    <nav class="navbar navbar-expand-xl navbar-warning bg-warning">
      <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="{{ url_for('main.home') }}">
          <img src="{{ url_for('static', filename='img/property_sales_logo.png') }}" alt="Logo" width="80" height="60"
            class="d-inline-block align-text-top" />
          Property Sales
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarWarning"
          aria-controls="navbarWarning" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse show" id="navbarWarning">
          <ul class="navbar-nav ms-auto mb-2 mb-xl-0 me-2">

            <li class="nav-item d-flex align-items-center me-4">
              <i class="bi bi-house-door me-1"></i>
              <a class="nav-link" href="{{ url_for('main.home') }}">Home</a>
            </li>

            <li class="nav-item d-flex align-items-center me-4">
              <i class="bi bi-view-list me-1"></i>
              <a class="nav-link" href="{{ url_for('main.listings') }}">
                Listed Properties
              </a>
            </li>

            <li class="nav-item d-flex align-items-center me-4">
              <i class="bi bi-bookmark me-1"></i>
              <a class="nav-link" href="{{ url_for('main.bookmarks') }}">
                Saved Properties
              </a>
            </li>

          </ul>

          <button class="btn btn-outline-dark" type="submit">
            <i class="bi bi-box-arrow-right"></i> Sign in
          </button>
        </div>

      </div>
    </nav>
  </header>

  <!-- PAGE CONTENT -->
  {% block content %}
  {% endblock %}

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-container">

      <div class="footer-right">
        <a class="footer-logo" href="{{ url_for('main.home') }}">
          <img src="{{ url_for('static', filename='img/property_sales_logo.png') }}" alt="Property Sales" width="135"
            height="78" />
        </a>

        <ul class="footer-list">

          <li class="nav-item nav-item-footer d-flex align-items-center me-4">
            <i class="bi bi-house-door me-1"></i>
            <a class="nav-link" href="{{ url_for('main.home') }}">Home</a>
          </li>

          <li class="nav-item nav-item-footer d-flex align-items-center me-4">
            <i class="bi bi-view-list me-1"></i>
            <a class="nav-link" href="{{ url_for('main.listings') }}">
              Listed Properties
            </a>
          </li>

          <li class="nav-item nav-item-footer d-flex align-items-center me-4">
            <i class="bi bi-bookmark me-1"></i>
            <a class="nav-link" href="{{ url_for('main.bookmarks') }}">
              Saved Properties
            </a>
          </li>

        </ul>
      </div>

    </div>
  </footer>

  <!-- Bootstrap Script -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</body>

</html>
